<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2c2c74,#7b2cbf);
    padding:20px;
}

.container{
    width:400px;
    background:white;
    padding:25px 30px;
    border-radius:18px;
    box-shadow:0 12px 30px rgba(0,0,0,0.2);
}

.container h1{
    text-align:center;
    margin-bottom:18px;
    color:#222;
    font-size:30px;
}

.form-group{
    margin-bottom:10px;
}

label{
    display:block;
    margin-bottom:4px;
    font-size:14px;
    font-weight:bold;
    color:#333;
}

input, textarea{
    width:100%;
    padding:10px;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:14px;
    outline:none;
}

input:focus,
textarea:focus{
    border-color:#6c63ff;
    box-shadow:0 0 5px rgba(108,99,255,0.3);
}

textarea{
    height:65px;
    resize:none;
}

button{
    width:100%;
    padding:12px;
    background:linear-gradient(90deg,#6c63ff,#5a54e8);
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
    margin-top:8px;
}

.login-link{
    text-align:center;
    margin-top:12px;
    font-size:14px;
}

.login-link a{
    color:#6c63ff;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">
    <h1>Create Account</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Username</label>
            <input type="text" name="user_name" required>
        </div>


        <div class="form-group">
            <label>Mobile Number</label>
            <input type="number" name="user_mobile" required>
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" name="user_email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="user_password" required>
        </div>

        <div class="form-group">
            <label>Address</label>
            <textarea name="user_address"></textarea>
        </div>

        <button type="submit">Register</button>

        <div class="login-link">
            Already have account? <a href="/login/">Login</a>
        </div>

    </form>
</div>

</body>
</html>
