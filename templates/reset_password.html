<!-- reset_password.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2c2c74,#7b2cbf);
}

.container{
    width:400px;
    background:white;
    padding:35px;
    border-radius:18px;
    box-shadow:0 15px 35px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#222;
}

input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    margin-bottom:15px;
    font-size:15px;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(90deg,#6c63ff,#5a54e8);
    color:white;
    font-size:16px;
    cursor:pointer;
}

.msg{
    color:red;
    text-align:center;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">
    <h1>Reset Password</h1>

    <form method="POST">
        {% csrf_token %}
        <input type="password" name="new_password" placeholder="New Password" required>
        <input type="password" name="confirm_password" placeholder="Confirm Password" required>

        <button type="submit">Update Password</button>
    </form>

    <div class="msg">{{ msg }}</div>
</div>

</body>
</html>
