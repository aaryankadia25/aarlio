<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2c2c74,#7b2cbf);
}

.card{
    width:400px;
    background:white;
    padding:35px;
    border-radius:20px;
    box-shadow:0 15px 35px rgba(0,0,0,0.20);
}

h2{
    text-align:center;
    margin-bottom:25px;
    font-weight:600;
}

input{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:10px;
    font-size:15px;
}

input:focus{
    outline:none;
    border-color:#6c63ff;
}

button{
    width:100%;
    padding:13px;
    border:none;
    border-radius:10px;
    background:#ff5e62;
    color:white;
    font-size:16px;
    font-weight:500;
    cursor:pointer;
}

button:hover{
    background:#e0484d;
}

.links{
    text-align:center;
    margin-top:15px;
    font-size:14px;
}

.links a{
    color:#6c63ff;
    text-decoration:none;
    font-weight:500;
}
</style>
</head>

<body>

<div class="card">
    <h2>Welcome Back</h2>

    <form method="POST">
        {% csrf_token %}

        <input type="email" name="user_email" placeholder="Email Address" required>

        <input type="password" name="user_password" placeholder="Password" required>

        <button type="submit">Login</button>

        <div class="links">
            <p><a href="{% url 'forgot_password' %}">Forgot Password?</a></p>
            <p>Don't have account? <a href="{% url 'register' %}">Register</a></p>
        </div>

    </form>
</div>

</body>
</html>
