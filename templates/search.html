{% extends 'base.html' %}

{% block title %}
Search
{% endblock %}

{% block extra_css %}

<style>

.container{
    padding:30px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:10px;
}

.price{
    color:#ff5e62;
    font-weight:600;
}

.btn{
    display:block;
    margin-top:10px;
    text-align:center;
    padding:10px;
    background:#6c63ff;
    color:white;
    text-decoration:none;
    border-radius:10px;
}

</style>

{% endblock %}

{% block content %}

<div class="container">

<h2>Search Results for "{{ query }}"</h2>

<div class="grid">

{% for p in products %}

<div class="card">

    <img src="{{ p.image.url }}">

    <h3>{{ p.title }}</h3>

    <p class="price">₹{{ p.price }}</p>

    <a href="{% url 'product_detail' p.id %}" class="btn">
        View Product
    </a>

</div>

{% empty %}

<h3>No products found</h3>

{% endfor %}

</div>

</div>

{% endblock %}
